services:
  pg_master:
    image: postgres:15
    container_name: pg_master
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: service_db
    ports:
      - "5434:5432"
    volumes:
      - pg_master_data:/var/lib/postgresql/data
      - ./pg_hba_master.conf:/etc/postgresql/pg_hba_master.conf:ro
    command: >
      postgres
      -c listen_addresses='*'
      -c hba_file=/etc/postgresql/pg_hba_master.conf
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c wal_keep_size=512MB
      -c password_encryption=md5

  flyway_master:
    image: flyway/flyway:latest
    container_name: flyway_master
    depends_on:
      - pg_master
    command: -url=jdbc:postgresql://pg_master:5432/service_db -user=postgres -password=postgres -schemas=service migrate
    volumes:
      - ./migrations:/flyway/sql

  # Physical replica #1 (data dir будет заполнен через pg_basebackup)
  pg_replica1:
    image: postgres:15
    container_name: pg_replica1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: service_db
    ports:
      - "5435:5432"
    volumes:
      - pg_replica1_data:/var/lib/postgresql/data
    depends_on:
      - pg_master

  # Physical replica #2
  pg_replica2:
    image: postgres:15
    container_name: pg_replica2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: service_db
    ports:
      - "5436:5432"
    volumes:
      - pg_replica2_data:/var/lib/postgresql/data
    depends_on:
      - pg_master

  # Logical subscriber (отдельный инстанс)
  pg_logical_sub:
    image: postgres:15
    container_name: pg_logical_sub
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: service_db
    ports:
      - "5437:5432"
    volumes:
      - pg_logical_sub_data:/var/lib/postgresql/data
    command: >
      postgres
      -c listen_addresses='*'
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10

  flyway_logical_sub:
    image: flyway/flyway:latest
    container_name: flyway_logical_sub
    depends_on:
      - pg_logical_sub
    command: -url=jdbc:postgresql://pg_logical_sub:5432/service_db -user=postgres -password=postgres -schemas=service migrate
    volumes:
      - ./migrations:/flyway/sql

volumes:
  pg_master_data:
  pg_replica1_data:
  pg_replica2_data:
  pg_logical_sub_data: